# ================================================================
# Docker Compose — 生产优化版
# 相比根目录的 docker-compose.yaml，此版本增加了：
#   - 资源限制
#   - 健康检查
#   - 日志轮转
#   - 重启策略
#   - 网络隔离
# 用法: docker compose -f deploy/scripts/docker-compose-prod.yaml up -d
# ================================================================

services:
  mysql:
    image: mysql:8.4
    container_name: webchat-mysql
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-webchat2026}
      MYSQL_DATABASE: webchat
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD:-webchat2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - webchat-net

  mongodb:
    image: mongo:8.3
    container_name: webchat-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - webchat-net

  redis:
    image: redis:7.4-alpine
    container_name: webchat-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - webchat-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webchat-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-webchat2026}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "127.0.0.1:8080:8080"
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - webchat-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webchat-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - webchat-net

volumes:
  mysql_data:
  mongo_data:
  redis_data:

networks:
  webchat-net:
    driver: bridge
