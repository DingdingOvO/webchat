# ================================================================
# Nginx 配置 — WebChat 前端 + 后端反向代理
# 适用于独立服务器/VPS 部署
# ================================================================

upstream webchat-backend {
    # 单机部署
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
    # 多实例负载均衡
    # server 10.0.0.2:8080 max_fails=3 fail_timeout=30s;
    # server 10.0.0.3:8080 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

server {
    listen 80;
    server_name chat.yourdomain.com;

    # === HTTP → HTTPS 重定向 ===
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chat.yourdomain.com;

    # === SSL 证书 ===
    ssl_certificate     /etc/letsencrypt/live/chat.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # === 安全头 ===
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # === 前端静态文件 ===
    root /opt/webchat/frontend/dist;
    index index.html;

    # === 日志 ===
    access_log /var/log/nginx/webchat-access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/webchat-error.log warn;

    # === 静态资源缓存 ===
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # === SPA 路由回退 ===
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }

    # === API 反向代理 ===
    location /api/ {
        proxy_pass http://webchat-backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # === WebSocket 代理 ===
    location /ws/ {
        proxy_pass http://webchat-backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # === 健康检查 ===
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
