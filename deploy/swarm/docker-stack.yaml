version: "3.8"

# ================================================================
# Docker Swarm Stack — webchat
# 部署: docker stack deploy -c deploy/swarm/docker-stack.yaml webchat
# ================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ---------------------------------------------------------------
  # MySQL — 元数据
  # ---------------------------------------------------------------
  mysql:
    image: mysql:8.0
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-webchat2026}
      MYSQL_DATABASE: webchat
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - webchat-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD:-webchat2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------
  # MongoDB — 消息冷存储
  # ---------------------------------------------------------------
  mongodb:
    image: mongo:7
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    volumes:
      - mongo_data:/data/db
    networks:
      - webchat-net

  # ---------------------------------------------------------------
  # Redis — 热消息 / 实时状态 / Pub-Sub
  # ---------------------------------------------------------------
  redis:
    image: redis:7-alpine
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    volumes:
      - redis_data:/data
    networks:
      - webchat-net

  # ---------------------------------------------------------------
  # Backend — Spring Boot
  # ---------------------------------------------------------------
  backend:
    image: ghcr.io/dingdingovo/webchat-backend:latest
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-webchat2026}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      - mysql
      - mongodb
      - redis
    networks:
      - webchat-net

  # ---------------------------------------------------------------
  # Frontend — React + Nginx
  # ---------------------------------------------------------------
  frontend:
    image: ghcr.io/dingdingovo/webchat-frontend:latest
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.webchat.rule=Host(`${DOMAIN:-chat.example.com}`)"
        - "traefik.http.services.webchat.loadbalancer.server.port=80"
    depends_on:
      - backend
    networks:
      - webchat-net

networks:
  webchat-net:
    driver: overlay
    attachable: true

volumes:
  mysql_data:
    driver: local
  mongo_data:
    driver: local
  redis_data:
    driver: local
