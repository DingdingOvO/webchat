apiVersion: v1
kind: ConfigMap
metadata:
  name: webchat-config
  namespace: {{ .Values.namespace }}
data:
  MYSQL_HOST: "{{ .Release.Name }}-mysql"
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: "webchat"
  MONGO_HOST: "{{ .Release.Name }}-mongodb"
  MONGO_PORT: "27017"
  REDIS_HOST: "{{ .Release.Name }}-redis"
  REDIS_PORT: "6379"
  BACKEND_URL: "http://{{ .Release.Name }}-backend:{{ .Values.backend.port }}"
---
apiVersion: v1
kind: Secret
metadata:
  name: webchat-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  MYSQL_USER: "root"
  MYSQL_PASSWORD: "{{ .Values.secrets.mysqlPassword }}"
  JWT_SECRET: "{{ .Values.secrets.jwtSecret }}"
