apiVersion: apps/v1
kind: Deployment
metadata:
  name: webchat-backend
  namespace: webchat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webchat
      component: backend
  template:
    metadata:
      labels:
        app: webchat
        component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/dingdingovo/webchat-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: webchat-config
            - secretRef:
                name: webchat-secret
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: webchat-backend
  namespace: webchat
spec:
  selector:
    app: webchat
    component: backend
  ports:
    - port: 8080
      targetPort: 8080
