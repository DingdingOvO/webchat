apiVersion: apps/v1
kind: Deployment
metadata:
  name: webchat-redis
  namespace: webchat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webchat
      component: redis
  template:
    metadata:
      labels:
        app: webchat
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: webchat
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: webchat-redis
  namespace: webchat
spec:
  selector:
    app: webchat
    component: redis
  ports:
    - port: 6379
      targetPort: 6379
