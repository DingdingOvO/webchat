apiVersion: apps/v1
kind: Deployment
metadata:
  name: webchat-frontend
  namespace: webchat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webchat
      component: frontend
  template:
    metadata:
      labels:
        app: webchat
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/dingdingovo/webchat-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: webchat-config
                  key: BACKEND_URL
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: webchat-frontend
  namespace: webchat
spec:
  selector:
    app: webchat
    component: frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webchat-ingress
  namespace: webchat
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
spec:
  ingressClassName: nginx
  rules:
    - host: chat.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webchat-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: webchat-backend
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: webchat-backend
                port:
                  number: 8080
  tls:
    - hosts:
        - chat.yourdomain.com
      secretName: webchat-tls
