spring.application.name=webchat

# MySQL — 元数据
spring.datasource.url=jdbc:mysql://localhost:3306/webchat?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=webchat2026

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# MongoDB — 消息本体
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=webchat

# Redis — 热消息 + 实时状态
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# JWT
jwt.secret=WebChat2026SecretKeyMustBe256BitsLongForHS512Algorithm!!_ABCDEFGH
jwt.expiration-ms=86400000

# 静态文件（前端构建产物）
spring.web.resources.static-locations=file:./frontend/dist/,classpath:/static/
spring.web.resources.add-mappings=true
server.port=8080
