# ================================================================
# Nixpacks 配置 — Railway 构建 fallback
# 当 Docker 不可用时，Nixpacks 自动检测 Java/Maven 项目
# ================================================================

[phases.setup]
  nixPkgs = ["nodejs_22", "maven", "curl"]

[phases.install]
  cmds = [
    "cd frontend && npm ci && npm run build",
    "mvn dependency:go-offline -B"
  ]

[phases.build]
  cmds = [
    "cp -r frontend/dist src/main/resources/static",
    "mvn clean package -DskipTests"
  ]

[start]
  cmd = "java -jar target/webchat-server-*.jar"
