# Dependabot — Dependency & GitHub Action update automation
# @see https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # Maven (backend)
  - package-ecosystem: maven
    directory: /packages/server
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend

  # npm (frontend)
  - package-ecosystem: npm
    directory: /packages/serverfrontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /packages/server
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
