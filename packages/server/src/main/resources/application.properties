spring.application.name=webchat

# MySQL — 元数据
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/webchat?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:webchat2026}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# MongoDB — 消息本体
spring.data.mongodb.host=${MONGO_HOST:localhost}
spring.data.mongodb.port=${MONGO_PORT:27017}
spring.data.mongodb.database=webchat

# Redis — 热消息 + 实时状态
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# JWT
# gitleaks:allow
jwt.secret=WebChat2026SecretKeyMustBe256BitsLongForHS512Algorithm!!_ABCDEFGH
jwt.expiration-ms=86400000

# 静态文件（前端构建产物）
spring.web.resources.static-locations=file:./packages/frontend/dist/,classpath:/static/
spring.web.resources.add-mappings=true
server.port=8080
