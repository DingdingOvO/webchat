# lefthook.yml — Git hooks manager for WebChat (frontend + backend)
# Docs: https://evilmartians.com/chronicles/lefthook-as-an-alternative-to-husky

pre-commit:
  parallel: true
  commands:
    frontend-lint:
      root: frontend/
      glob: "*.{js,jsx,ts,tsx,mjs,cjs}"
      run: npx eslint --fix {staged_files} || true
      stage_fixed: true

    frontend-format:
      root: frontend/
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,json,css,scss,md}"
      run: npx prettier --write {staged_files} || true
      stage_fixed: true

    backend-format:
      glob: "*.java"
      run: mvn spotless:apply -q || true
      stage_fixed: true

    backend-checkstyle:
      glob: "*.java"
      run: mvn checkstyle:check -q || true

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-push:
  commands:
    quality-check:
      run: make lint typecheck format-check 2>&1 || true
